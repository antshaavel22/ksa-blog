name: Daily Content Scout

on:
  schedule:
    - cron: '0 5 * * *'   # 7:00 AM Tallinn time (UTC+2) every day
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  scout:
    runs-on: ubuntu-latest
    timeout-minutes: 15     # Hard timeout — prevents 6-hour hangs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        timeout-minutes: 5
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Run content scout
        timeout-minutes: 8
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run scout -- --limit 1 --trilingual

      - name: Check for new drafts
        id: check
        run: |
          if git status --short content/drafts/ | grep -q '^??'; then
            echo "has_drafts=true" >> $GITHUB_OUTPUT
            NEW_FILES=$(git status --short content/drafts/ | awk '{print $2}' | tr '\n' ', ')
            echo "new_files=$NEW_FILES" >> $GITHUB_OUTPUT
          else
            echo "has_drafts=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push drafts directly to main
        if: steps.check.outputs.has_drafts == 'true'
        run: |
          git config user.name "KSA Content Scout"
          git config user.email "scout@ksa.ee"
          git add content/drafts/
          git commit -m "draft: AI content scout $(date +'%Y-%m-%d') — ${{ steps.check.outputs.new_files }}"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        if: steps.check.outputs.has_drafts == 'true'
        run: |
          echo "✅ New drafts committed to main:" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.check.outputs.new_files }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Review at https://blog.ksa.ee/admin (tab: Mustandid)" >> $GITHUB_STEP_SUMMARY

      - name: No new content today
        if: steps.check.outputs.has_drafts == 'false'
        run: echo "ℹ️ No new articles found today — nothing to commit." >> $GITHUB_STEP_SUMMARY
