name: Daily Content Scout

# ─── SCHEDULE ────────────────────────────────────────────────────────────────
# Runs every day at 07:00 Tallinn time (UTC+2 / UTC+3 summer)
# Generates 1 trilingual draft (ET + RU + EN) from top health/vision/lifestyle blogs
# Drafts land in content/drafts/et|ru|en/ and appear in admin Mustandid tab
# This schedule runs indefinitely until manually disabled.
# ─────────────────────────────────────────────────────────────────────────────

on:
  # DISABLED 2026-04-18 — Ants writes all drafts manually for quality/fact control
  # schedule:
  #   - cron: '0 5 * * *'   # 07:00 EET (UTC+2) · 06:00 EEST (UTC+3 summer)
  workflow_dispatch:        # Manual trigger only from GitHub UI → Actions tab

permissions:
  contents: write           # Required for git push from GITHUB_TOKEN

jobs:
  scout:
    runs-on: ubuntu-latest
    timeout-minutes: 20     # Hard timeout — prevents runaway jobs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        timeout-minutes: 5
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Run content scout — Top 20 sources, trilingual, Sonnet quality
        timeout-minutes: 12
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run scout -- --limit 1 --trilingual

      - name: Check for new drafts
        id: check
        run: |
          if git status --short content/drafts/ | grep -q '^??'; then
            echo "has_drafts=true" >> $GITHUB_OUTPUT
            NEW_FILES=$(git status --short content/drafts/ | awk '{print $2}' | tr '\n' ', ')
            echo "new_files=$NEW_FILES" >> $GITHUB_OUTPUT
          else
            echo "has_drafts=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push drafts directly to main
        if: steps.check.outputs.has_drafts == 'true'
        run: |
          git config user.name "KSA Content Scout"
          git config user.email "scout@ksa.ee"
          git add content/drafts/
          git commit -m "draft: AI content scout $(date +'%Y-%m-%d') — ${{ steps.check.outputs.new_files }}"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        if: steps.check.outputs.has_drafts == 'true'
        run: |
          echo "✅ New drafts committed to main:" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.check.outputs.new_files }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Review at https://blog.ksa.ee/admin (tab: Mustandid)" >> $GITHUB_STEP_SUMMARY

      - name: No new content today
        if: steps.check.outputs.has_drafts == 'false'
        run: echo "ℹ️ No new articles found today — nothing to commit." >> $GITHUB_STEP_SUMMARY
